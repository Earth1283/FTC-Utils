name: Build binaries

on:
  push:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.project }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        project: [control-hub-rooter, fast-adb, rev-hub-jailbreak]
        include:
          - os: ubuntu-latest
            platform: linux
            ext: ""
          - os: windows-latest
            platform: windows
            ext: ".exe"
          - os: macos-latest
            platform: macos
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r "${{ matrix.project }}/requirements.txt"
          python -m pip install nuitka ordered-set

      - name: Compile with Nuitka
        shell: bash
        working-directory: ${{ matrix.project }}
        run: |
          python -m nuitka \
            --onefile \
            --standalone \
            --assume-yes-for-downloads \
            --output-dir=../dist \
            --output-filename="${{ matrix.project }}-${{ matrix.platform }}${{ matrix.ext }}" \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project }}-${{ matrix.platform }}
          path: dist/${{ matrix.project }}-${{ matrix.platform }}${{ matrix.ext }}

  release:
    name: Tag and release
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute next tag
        id: tag
        run: |
          git fetch --tags
          latest=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            new_tag="v0.1.0"
          else
            ver=${latest#v}
            IFS='.' read -r major minor patch <<< "$ver"
            new_tag="v${major}.${minor}.$((patch+1))"
          fi
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.new_tag }}"
          git push origin "${{ steps.tag.outputs.new_tag }}"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          files: dist/*
